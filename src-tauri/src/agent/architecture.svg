="#FAFAD2" height="28.6627" style="stroke:#4A4A4A;stroke-width:1.5625;stroke-dasharray:3.125,3.125;" width="142.4572" x="2483.8162" y="823.8154"/><text fill="#000000" font-family="sans-serif" font-size="18.75" font-style="italic" lengthAdjust="spacing" textLength="139.3322" x="2485.3787" y="845.4218">R: tauri::Runtime</text><line style="stroke:#4A4A4A;stroke-width:0.7813;" x1="1305.4219" x2="2620.0234" y1="899.4592" y2="899.4592"/><line style="stroke:#4A4A4A;stroke-width:0.7813;" x1="1305.4219" x2="2620.0234" y1="911.9592" y2="911.9592"/><text fill="#000000" font-family="JetBrains Mono" font-size="21.875" lengthAdjust="spacing" textLength="319.1987" x="1313.2344" y="941.5935">+agent_type(&amp;self) : AgentType</text><text fill="#000000" font-family="JetBrains Mono" font-size="21.875" lengthAdjust="spacing" textLength="594.2103" x="1313.2344" y="971.3871">+status_source(&amp;self, cwd: &amp;Path, sid: &amp;str) : StatusSource</text><text fill="#000000" font-family="JetBrains Mono" font-size="21.875" lengthAdjust="spacing" textLength="722.3097" x="1313.2344" y="1001.1807">+parse_status(&amp;self, sid: &amp;str, raw: &amp;str) : Result&lt;ParsedStatus, String&gt;</text><text fill="#000000" font-family="JetBrains Mono" font-size="21.875" lengthAdjust="spacing" textLength="633.7602" x="1313.2344" y="1030.9743">+validate_transcript(&amp;self, raw: &amp;str) : Result&lt;PathBuf, String&gt;</text><text fill="#000000" font-family="JetBrains Mono" font-size="21.875" lengthAdjust="spacing" textLength="1298.9765" x="1313.2344" y="1060.768">+tail_transcript(&amp;self, app: AppHandle&lt;R&gt;, sid: String, cwd: Option&lt;PathBuf&gt;, path: PathBuf) : Result&lt;TranscriptHandle, String&gt;</text></g><g class="entity" data-qualified-name="GMN7" data-source-line="65" id="ent0008"><path d="M810.8125,860.1592 L810.8125,1041.7781 A0,0 0 0 0 810.8125,1041.7781 L1249.002,1041.7781 A0,0 0 0 0 1249.002,1041.7781 L1249.002,956.5342 L1303.0781,950.2842 L1249.002,944.0342 L1249.002,875.7842 L