name: CI Checks

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main
      - feature/ghostty-native-macos-runtime

jobs:
  code-check:
    name: Code Quality Check
    needs: [bindings]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Clear generated bindings
        run: mkdir -p src/bindings && find src/bindings -name '*.ts' ! -name 'index.ts' -delete

      - name: Download generated bindings
        uses: actions/download-artifact@v4
        with:
          name: ts-bindings
          path: src/bindings

      - name: Run ESLint
        run: npm --ignore-scripts run lint

      - name: Check formatting
        run: npm --ignore-scripts run format:check

      - name: Type check
        run: npm run type-check:generated
        if: hashFiles('tsconfig.json') != ''

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  rust-test:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Run Rust tests
        run: cargo test

  bindings:
    name: Generate TypeScript Bindings
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Generate bindings
        run: npm run generate:bindings

      - name: Verify bindings are up to date
        run: |
          git diff --exit-code src/bindings/
          test -z "$(git ls-files --others --exclude-standard src/bindings/)"

      - name: Upload generated bindings
        uses: actions/upload-artifact@v4
        with:
          name: ts-bindings
          path: src/bindings/*.ts
          if-no-files-found: error
          overwrite: true

  native-ghostty-macos:
    name: Native Ghostty macOS Smoke
    runs-on: macos-26
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build native Ghostty parent
        run: npm run ghostty:native-parent:build

      - name: Smoke native Ghostty parent artifacts
        run: npm run ghostty:native-parent:smoke

      - name: Verify macOS packaging command graph
        run: node scripts/package-electron.mjs --dry-run mac-arm64
