name: E2E Tests

on:
  push:
    branches:
      - main
    paths:
      - 'src-tauri/**'
      - 'src/**'
      - 'electron/**'
      - 'tests/e2e/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'src-tauri/**'
      - 'src/**'
      - 'electron/**'
      - 'tests/e2e/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - '.github/workflows/e2e.yml'

# Cancel in-flight runs for the same ref — E2E is expensive enough that
# superseding reruns is the right default.
concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-linux:
    name: E2E smoke suite (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # Key the cargo cache against the e2e-test feature so cache
          # entries from non-e2e CI jobs don't mask recompiles triggered
          # by this job.
          shared-key: e2e-test

      - name: Install system dependencies
        # xvfb is required by xvfb-run for headless Electron runs.
        # All GTK/webkit2gtk apt deps were dropped in PR-D3 once the
        # sidecar binary stopped link-pulling the Tauri dependency graph.
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Install npm dependencies
        run: npm ci

      - name: Build E2E artifacts (renderer + Electron bundles + sidecar)
        run: npm run test:e2e:build

      - name: Run core E2E suite
        run: xvfb-run --auto-servernum npm run test:e2e

      - name: Run terminal E2E suite
        run: xvfb-run --auto-servernum npm run test:e2e:terminal

      - name: Run agent E2E suite
        run: xvfb-run --auto-servernum npm run test:e2e:agent

      - name: Upload E2E diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-diagnostics-${{ github.run_id }}
          path: |
            src-tauri/target/debug/vimeflow-backend
            dist/
            dist-electron/
          retention-days: 3
          if-no-files-found: ignore
