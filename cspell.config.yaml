version: '0.2'
language: en

words:
  # Claude Code tool names (also used uppercased in UI labels)
  - webfetch
  - websearch
  - notebookedit
  - multiedit

  # Buffer-drain F6 fix: late-event tombstoning of removed pty ids
  - tombstoned
  - tombstoning
  # removeSession P1 race-fix vocabulary
  - unkilled
  - ptys

  # Anthropic id prefixes appearing in code and test fixtures
  - toolu

  # General vocabulary flagged by cspell's defaults
  - unparseable
  - lossily

  # Project
  - vibm
  - Vimeflow

  # Tauri
  - tauri
  - wry
  - tao
  - webview
  - appimage
  - rusqlite

  # Rust
  - thiserror
  - anyhow
  - serde
  - tokio
  - clippy
  - rustfmt
  - reqwest
  - chrono

  # React / TypeScript
  - vitest
  - tsx
  - jsx
  - unmount
  - unlisten
  - unhover
  - zustand
  - tanstack
  - conv
  - framer
  - contenteditable

  # Design / UI
  - glassmorphism
  - catppuccin
  - Catppuccin

  # Workspace domain abbreviations
  - sess # session
  - proj # project
  - terminalPid # terminal process ID
  - cwds # current working directories (plural of cwd)

  # Syntax Highlighting
  - shiki
  - Shiki

  # Editor libraries
  - replit
  - Replit
  - codemirror
  - lezer

  # Tools
  - cspell
  - eslint
  - prettier
  - storybook
  - playwright
  - wdio
  - WDIO
  - WebdriverIO
  - webdriver

  # Terminal / PTY
  - tput
  - xterm
  - pty
  - termios
  - statusline

ignorePaths:
  - node_modules
  - dist
  - coverage
  - src-tauri/target
  - '**/*.min.js'
  - '**/*.d.ts'
  - playwright-report
  - src/bindings/*.ts
