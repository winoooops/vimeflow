version: '0.2'
language: en

words:
  # Claude Code tool names (also used uppercased in UI labels)
  - webfetch
  - websearch
  - notebookedit
  - multiedit

  # Buffer-drain F6 fix: late-event tombstoning of removed pty ids
  - tombstoned
  - tombstoning
  # removeSession P1 race-fix vocabulary
  - unkilled
  - ptys

  # Anthropic id prefixes appearing in code and test fixtures
  - toolu

  # General vocabulary flagged by cspell's defaults
  - unparseable
  - lossily
  - dedup

  # Project
  - vibm
  - Vimeflow

  # Tauri
  - tauri
  - wry
  - tao
  - webview
  - appimage
  - rusqlite

  # Rust
  - thiserror
  - anyhow
  - serde
  - tokio
  - clippy
  - rustfmt
  - reqwest
  - chrono

  # ESLint / AST
  - quasis # ESTree TemplateElement nodes in a TemplateLiteral

  # React / TypeScript
  - vitest
  - tsx
  - jsx
  - unmount
  - unlisten
  - unhover
  - zustand
  - tanstack
  - conv
  - framer
  - contenteditable

  # Kimi / Moonshot AI
  - kimi
  - Kimi

  # opencode (SST coding agent)
  - opencode
  - Opencode

  # Design / UI
  - glassmorphism
  - catppuccin
  - Catppuccin
  - flexoki
  - Flexoki
  - Steph # Flexoki author first name
  - Ango # Flexoki author surname
  - wght # Material Symbols font-variation axis (weight)
  - topbar # data-testid token for the sidebar top-bar toggle
  - sparkline

  # Custom DOM events
  - vfliquidwake

  # Browser / WebAuthn
  - webauthn
  - favicons
  - ipv6

  # Workspace domain abbreviations
  - sess # session
  - proj # project
  - terminalPid # terminal process ID
  - cwds # current working directories (plural of cwd)
  - vsplit
  - hsplit
  - AZERTY # French/Belgian keyboard layout
  - QWERTZ # German/Swiss keyboard layout

  # Syntax Highlighting
  - shiki
  - Shiki

  # Editor libraries
  - replit
  - Replit
  - codemirror
  - lezer

  # Tools
  - cspell
  - eslint
  - prettier
  - storybook
  - playwright
  - wdio
  - WDIO
  - WebdriverIO
  - webdriver
  - chromedriver
  - mkdtemp

  # Terminal / PTY
  - tput
  - xterm
  - pty
  - termios
  - statusline
  - nvim
  - DECRQM
  - JetBrainsMono
  - MesloLGS
  - FiraCode
  - Cascadia
  - Menlo
  - Ioskeley
  - Iosevka
  - backgrounding

  # Git apply flag — `--whitespace=nowarn` suppresses whitespace warnings
  - nowarn
  - worktree
  - worktrees
  - revparse

ignorePaths:
  - node_modules
  - dist
  - coverage
  - target
  - '**/*.min.js'
  - '**/*.d.ts'
  - playwright-report
  - src/bindings/*.ts
