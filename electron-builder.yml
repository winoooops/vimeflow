# Linux x64 AppImage and macOS arm64 DMG packaging for Vimeflow.
# Use the package scripts so the bundled Rust sidecar matches the host target.

appId: io.vimeflow.app
productName: Vimeflow

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
  # Vite pre-bundles all deps into dist/ and dist-electron/; see rules/electron/optimization.md.
  # If a main-process dependency must be required un-bundled (e.g. a native .node addon),
  # re-include only that package explicitly; see the "node_modules trap" section.
  - '!node_modules/**'

# English-only UI; keep Linux's en-US.pak and macOS's en.lproj/locale.pak.
electronLanguages:
  - en-US
  - en

extraResources:
  - from: target/release/vimeflow-backend
    to: bin/vimeflow-backend
  - from: src/assets/fonts/ioskeley/LICENSE-OFL.txt
    to: licenses/IoskeleyMono-OFL.txt

asar: true

linux:
  target:
    - AppImage
  category: Development
  artifactName: vimeflow-${version}-${arch}.AppImage
  icon: build/icon.png

mac:
  identity: null
  target:
    - dmg
  category: public.app-category.developer-tools
  artifactName: vimeflow-${version}-${arch}.dmg
  icon: build/icon.png

publish: null
