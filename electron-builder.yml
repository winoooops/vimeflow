# Linux x64 AppImage and macOS arm64 DMG packaging for Vimeflow.
# Use the package scripts so the bundled Rust sidecar matches the host target.

appId: io.vimeflow.app
productName: Vimeflow
electronVersion: 42.1.0

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json

extraResources:
  - from: target/release/vimeflow-backend
    to: bin/vimeflow-backend
  - from: src/assets/fonts/ioskeley/LICENSE-OFL.txt
    to: licenses/IoskeleyMono-OFL.txt

asar: true

linux:
  target:
    - AppImage
  category: Development
  artifactName: vimeflow-${version}-${arch}.AppImage
  icon: build/icon.png

mac:
  identity: null
  target:
    - dmg
  category: public.app-category.developer-tools
  artifactName: vimeflow-${version}-${arch}.dmg
  icon: build/composed_icon.icon
  extraResources:
    - from: dist-native/ghostty-parent
      to: ghostty-parent

publish: null
