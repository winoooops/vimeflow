<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>NativeOverlay Host</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
        font:
          12px system-ui,
          sans-serif;
      }

      #root {
        position: fixed;
        inset: 0;
      }

      .menu {
        position: absolute;
        min-width: 160px;
        max-width: 280px;
        padding: 4px;
        border-radius: 8px;
        background: rgba(250, 249, 245, 0.98);
        color: #171412;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.42);
      }

      .item {
        display: flex;
        width: 100%;
        min-height: 28px;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        border: 0;
        border-radius: 4px;
        padding: 4px 10px;
        background: transparent;
        color: inherit;
        font: inherit;
        text-align: left;
      }

      .item:hover,
      .item:focus {
        background: rgba(122, 92, 255, 0.16);
        outline: none;
      }

      .item:disabled {
        color: rgba(23, 20, 18, 0.42);
      }

      .shortcut {
        color: rgba(23, 20, 18, 0.62);
        font-family: ui-monospace, monospace;
        font-size: 10px;
      }
    </style>
  </head>
  <body data-native-overlay-host="true">
    <div id="root"></div>
    <script>
      const root = document.getElementById('root')
      const nativeOverlayHost = window.vimeflow.nativeOverlayHost
      let surfaceId = null
      let panel = null

      const clear = () => {
        surfaceId = null
        panel = null
        root.replaceChildren()
      }

      const close = (reason) => {
        if (surfaceId === null) {
          return
        }

        nativeOverlayHost.close({ surfaceId, reason })
        clear()
      }

      const fitPanel = () => {
        if (panel === null) {
          return
        }

        const rect = panel.getBoundingClientRect()
        const left = Math.min(
          Math.max(0, rect.left),
          Math.max(0, window.innerWidth - rect.width - 8)
        )
        const top = Math.min(
          Math.max(0, rect.top),
          Math.max(0, window.innerHeight - rect.height - 8)
        )

        panel.style.left = left + 'px'
        panel.style.top = top + 'px'
      }

      const renderMenu = (request) => {
        clear()
        surfaceId = request.surfaceId
        panel = document.createElement('div')
        panel.className = 'menu'
        panel.role = 'menu'
        panel.ariaLabel = request.payload.ariaLabel || 'Menu'
        panel.style.left = `${Math.max(0, Math.round(request.anchorRect.x))}px`
        panel.style.top = `${Math.max(0, Math.round(request.anchorRect.y))}px`

        for (const item of request.payload.items) {
          const button = document.createElement('button')
          button.type = 'button'
          button.className = 'item'
          button.role = 'menuitem'
          button.disabled = item.disabled === true
          button.setAttribute(
            'aria-disabled',
            item.disabled === true ? 'true' : 'false'
          )

          const label = document.createElement('span')
          label.textContent = item.label
          button.append(label)

          if (item.shortcut) {
            const shortcut = document.createElement('span')
            shortcut.className = 'shortcut'
            shortcut.textContent = item.shortcut
            button.append(shortcut)
          }

          button.addEventListener('click', () => {
            if (item.disabled === true || surfaceId === null) {
              return
            }

            nativeOverlayHost.action({
              surfaceId,
              actionId: item.id,
            })
            clear()
          })

          panel.append(button)
        }

        root.append(panel)
        nativeOverlayHost.ready({ surfaceId })
        requestAnimationFrame(fitPanel)
        panel.querySelector('button:not(:disabled)')?.focus()
      }

      document.addEventListener('pointerdown', (event) => {
        if (panel === null || panel.contains(event.target)) {
          return
        }

        close('outside')
      })

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
          close('outside')
        }
      })

      nativeOverlayHost.onRender((request) => {
        if (request.kind === 'menu' && request.payload.kind === 'menu') {
          renderMenu(request)
        }
      })
      nativeOverlayHost.onClear(clear)
    </script>
  </body>
</html>
