<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sidebar Session List — migration reference</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">

<style>
  html,body{ margin:0; height:100%; }
  body{ background:#0d0d1c; display:grid; place-items:center; font-family:'Inter',sans-serif; }
  .col{ width:272px; height:560px; background:#141424; border:1px solid rgba(74,68,79,0.25); border-radius:14px; overflow:hidden; display:flex; flex-direction:column; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

/* ── shared deps (already in the app: primitives.jsx + splitview.jsx) ───── */
function Icon({ name, size = 18, fill = 0, style, ...rest }) {
  return <span {...rest} className="material-symbols-outlined" style={{
    fontSize:size, fontVariationSettings:`'FILL' ${fill}, 'wght' 400, 'GRAD' 0, 'opsz' ${size}`,
    lineHeight:1, userSelect:'none', ...style }}>{name}</span>;
}
function SectionLabel({ children, style }) {
  return <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:10, fontWeight:700,
    letterSpacing:'0.16em', textTransform:'uppercase', color:'#6c7086', ...style }}>{children}</div>;
}
// VIMEFLOW_LAYOUTS (names) + LayoutGlyph — REUSED from splitview.jsx, do not re-draw.
const VIMEFLOW_LAYOUTS = {
  single:{name:'Single'}, vsplit:{name:'Vertical split'}, hsplit:{name:'Horizontal split'},
  threeRight:{name:'Main + 2 stack'}, quad:{name:'Quad'},
};
function LayoutGlyph({ layoutId }) {
  const stroke='currentColor', sw=1.4, r=1.4;
  if(layoutId==='single') return <svg width="14" height="11" viewBox="0 0 14 11"><rect x="1" y="1" width="12" height="9" rx={r} fill="none" stroke={stroke} strokeWidth={sw}/></svg>;
  if(layoutId==='vsplit') return <svg width="14" height="11" viewBox="0 0 14 11"><rect x="1" y="1" width="12" height="9" rx={r} fill="none" stroke={stroke} strokeWidth={sw}/><line x1="7" y1="1.5" x2="7" y2="9.5" stroke={stroke} strokeWidth={sw}/></svg>;
  if(layoutId==='hsplit') return <svg width="14" height="11" viewBox="0 0 14 11"><rect x="1" y="1" width="12" height="9" rx={r} fill="none" stroke={stroke} strokeWidth={sw}/><line x1="1.5" y1="5.5" x2="12.5" y2="5.5" stroke={stroke} strokeWidth={sw}/></svg>;
  if(layoutId==='threeRight') return <svg width="14" height="11" viewBox="0 0 14 11"><rect x="1" y="1" width="12" height="9" rx={r} fill="none" stroke={stroke} strokeWidth={sw}/><line x1="8" y1="1.5" x2="8" y2="9.5" stroke={stroke} strokeWidth={sw}/><line x1="8" y1="5.5" x2="12.5" y2="5.5" stroke={stroke} strokeWidth={sw}/></svg>;
  if(layoutId==='quad') return <svg width="14" height="11" viewBox="0 0 14 11"><rect x="1" y="1" width="12" height="9" rx={r} fill="none" stroke={stroke} strokeWidth={sw}/><line x1="7" y1="1.5" x2="7" y2="9.5" stroke={stroke} strokeWidth={sw}/><line x1="1.5" y1="5.5" x2="12.5" y2="5.5" stroke={stroke} strokeWidth={sw}/></svg>;
  return null;
}
window.VIMEFLOW_LAYOUTS = VIMEFLOW_LAYOUTS; window.LayoutGlyph = LayoutGlyph;

/* ════════════════ SidebarViewSwitcher ════════════════ */
function SegTab({ tab, active, onClick }) {
  const [hover,setHover]=useState(false);
  return (
    <button onClick={onClick} onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}
      style={{ position:'relative', zIndex:1, flex:1, minWidth:0, height:30,
        display:'flex', alignItems:'center', justifyContent:'center', gap:6,
        background:'transparent', border:'none', borderRadius:7, cursor:'pointer',
        color: active ? '#e2c7ff' : hover ? '#cdc3d1' : '#8a8299', transition:'color 140ms ease' }}>
      <Icon name={tab.icon} size={15} fill={active?1:0} />
      <span style={{ fontFamily:"'Inter',sans-serif", fontSize:12, fontWeight:600 }}>{tab.label}</span>
    </button>
  );
}
function SidebarViewSwitcher({ pane, onChange, onNew }) {
  const isMac = /Mac|iPhone|iPad/.test(navigator.platform||navigator.userAgent);
  const newKbd = isMac ? '⌘N' : 'Ctrl+N';
  const segs = [
    { id:'sessions', label:'Sessions', icon:'view_agenda' },
    { id:'files',    label:'Files',    icon:'folder_open' },
  ];
  const activeIndex = Math.max(0, segs.findIndex(t=>t.id===pane));
  return (
    <div style={{ display:'flex', alignItems:'stretch', gap:8, padding:'10px 12px 12px' }}>
      <div style={{ position:'relative', flex:1, minWidth:0, display:'flex', padding:3,
        background:'rgba(13,13,28,0.7)', border:'1px solid rgba(74,68,79,0.3)', borderRadius:10,
        boxShadow:'inset 0 1px 2px rgba(0,0,0,0.4)' }}>
        <div style={{ position:'absolute', top:3, bottom:3, left:3, width:`calc((100% - 6px) / ${segs.length})`,
          transform:`translateX(${activeIndex*100}%)`, background:'rgba(203,166,247,0.16)',
          border:'1px solid rgba(203,166,247,0.4)', borderRadius:7, boxShadow:'0 1px 2px rgba(0,0,0,0.25)',
          transition:'transform 180ms cubic-bezier(.4,0,.2,1)', pointerEvents:'none', zIndex:0 }}/>
        {segs.map(t => <SegTab key={t.id} tab={t} active={pane===t.id} onClick={()=>onChange(t.id)} />)}
      </div>
      <button onClick={onNew} title={`New session  ${newKbd}`} aria-label="New session"
        aria-keyshortcuts={isMac?'Meta+N':'Control+N'}
        onMouseEnter={(e)=>{ e.currentTarget.style.background='rgba(203,166,247,0.2)'; e.currentTarget.style.color='#f3eaff'; }}
        onMouseLeave={(e)=>{ e.currentTarget.style.background='rgba(203,166,247,0.1)'; e.currentTarget.style.color='#e2c7ff'; }}
        style={{ width:38, flexShrink:0, display:'grid', placeItems:'center', borderRadius:10, cursor:'pointer',
          background:'rgba(203,166,247,0.1)', border:'1px solid rgba(203,166,247,0.32)', color:'#e2c7ff',
          transition:'background 140ms ease, color 140ms ease' }}>
        <Icon name="add" size={19} />
      </button>
    </div>
  );
}

/* ════════════════ SessionCard ════════════════ */
function MenuRow({ icon, label, danger, onClick }) {
  const [hover,setHover]=useState(false);
  return (
    <button onClick={onClick} onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}
      style={{ width:'100%', display:'flex', alignItems:'center', gap:9, padding:'7px 9px', borderRadius:6,
        border:'none', cursor:'pointer',
        background: hover ? (danger?'rgba(255,148,165,0.12)':'rgba(226,199,255,0.1)') : 'transparent',
        color: danger ? (hover?'#ff94a5':'#d99aa6') : (hover?'#f3eeff':'#cdc3d1'),
        fontFamily:"'Inter',sans-serif", fontSize:12, fontWeight:500, transition:'all 120ms ease' }}>
      <Icon name={icon} size={14} style={{ flexShrink:0 }} /><span>{label}</span>
    </button>
  );
}
function SessionCard({ s, active, onClick, compact, onEdit, onRemove }) {
  const [hover,setHover]=useState(false);
  const [menu,setMenu]=useState(false);
  const meta = {
    running:{tone:'#7defa1',label:'Running',time:s.startedAgo},
    awaiting:{tone:'#ff94a5',label:'Awaiting you',time:s.startedAgo},
    completed:{tone:'#c9b3f0',label:'Done',time:s.updated},
    errored:{tone:'#ffb4ab',label:'Errored',time:s.updated},
    idle:{tone:'#8a8299',label:'Idle',time:null},
  }[s.state];
  return (
    <div role="button" tabIndex={0} onClick={onClick}
      onMouseEnter={()=>setHover(true)} onMouseLeave={()=>{ setHover(false); setMenu(false); }}
      style={{ position:'relative', display:'block', width:'100%', textAlign:'left',
        padding: compact?'9px 11px':'11px 12px', borderRadius:10, marginBottom:2, border:'none', cursor:'pointer',
        background: active?'rgba(203,166,247,0.13)':(hover||menu)?'rgba(255,255,255,0.04)':'transparent',
        transition:'background 140ms ease' }}>
      {/* Row 1 — title */}
      <div style={{ display:'flex', alignItems:'center', gap:8 }}>
        <span style={{ flex:1, minWidth:0, fontFamily:"'Instrument Sans',system-ui", fontSize:13.5, fontWeight:600,
          color: active?'#f3eeff':'#e3e0f7', letterSpacing:'-0.01em',
          whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{s.title}</span>
      </div>
      {/* Kebab — absolute overlay so the row never resizes on hover */}
      {(hover||menu) && (
        <div style={{ position:'absolute', top: compact?5:7, right:8 }}>
          <button onClick={(e)=>{ e.stopPropagation(); setMenu(m=>!m); }} title="Session actions" aria-label="Session actions"
            style={{ width:24, height:24, display:'grid', placeItems:'center', borderRadius:6, border:'none', cursor:'pointer',
              background: menu?'rgba(226,199,255,0.14)':'rgba(20,20,36,0.55)', color: menu?'#e2c7ff':'#9a93ab',
              backdropFilter:'blur(4px)', transition:'all 120ms ease' }}>
            <Icon name="more_horiz" size={16} />
          </button>
          {menu && (
            <div onClick={(e)=>e.stopPropagation()} style={{ position:'absolute', top:28, right:0, zIndex:40,
              minWidth:132, padding:4, background:'#1c1c30', borderRadius:9, border:'1px solid rgba(74,68,79,0.45)',
              boxShadow:'0 10px 28px rgba(0,0,0,0.45)' }}>
              <MenuRow icon="edit" label="Rename" onClick={()=>{ setMenu(false); onEdit&&onEdit(s); }} />
              <MenuRow icon="delete" label="Remove" danger onClick={()=>{ setMenu(false); onRemove&&onRemove(s); }} />
            </div>
          )}
        </div>
      )}
      {/* Row 2 — subtitle */}
      {!compact && s.subtitle && (
        <div style={{ marginTop:5, fontFamily:"'Inter',sans-serif", fontSize:11.5, color:'#9a93ab',
          lineHeight:1.35, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{s.subtitle}</div>
      )}
      {/* Row 3 — status text + pane-layout glyph */}
      <div style={{ display:'flex', alignItems:'baseline', gap:6, marginTop: compact?3:7 }}>
        <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:10, fontWeight:600, color:meta.tone }}>{meta.label}</span>
        {meta.time && <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:10, color:'#6c7086' }}>· {meta.time}</span>}
        <span style={{ flex:1 }}/>
        {s.layout && s.layout!=='single' && (
          <span style={{ display:'inline-flex', color: active?'#cba6f7':'#7c7689', flexShrink:0 }}
                title={(window.VIMEFLOW_LAYOUTS[s.layout]||{}).name}>
            <window.LayoutGlyph layoutId={s.layout} />
          </span>
        )}
      </div>
    </div>
  );
}

/* ── demo data + assembled list ── */
const SESSIONS = [
  { id:'a', title:'auth middleware refactor', subtitle:'Applying jose migration · L14-L42', state:'running',  startedAgo:'2m 14s', layout:'vsplit' },
  { id:'b', title:'harness test stabilization', subtitle:'Needs your approval to rm legacy fixtures', state:'awaiting', startedAgo:'4h 12m', layout:'threeRight' },
  { id:'c', title:'deploy workflow', subtitle:'Completed · ready to review', state:'completed', updated:'7h ago', layout:'single' },
  { id:'d', title:'ui component fix', subtitle:'Errored: `pnpm build` exited 1', state:'errored', updated:'1d ago', layout:'quad' },
  { id:'e', title:'scratchpad', subtitle:'No messages yet', state:'idle', layout:'single' },
];
function Demo() {
  const [pane,setPane]=useState('sessions');
  const [active,setActive]=useState('a');
  const activeList = SESSIONS.filter(s=>s.state==='running'||s.state==='awaiting');
  const recentList = SESSIONS.filter(s=>s.state!=='running'&&s.state!=='awaiting');
  return (
    <div className="col">
      <div style={{ padding:'14px 14px 4px', fontFamily:"'JetBrains Mono',monospace", fontSize:10, color:'#4a4458' }}>↑ agent status card + top bar (delivered earlier)</div>
      <SidebarViewSwitcher pane={pane} onChange={setPane} onNew={()=>alert('new session')} />
      <div style={{ flex:1, minHeight:0, overflow:'auto', padding:'10px 10px 16px' }}>
        {pane==='sessions' ? (
          <>
            <SectionLabel style={{ margin:'6px 4px 8px' }}>Active · {activeList.length}</SectionLabel>
            {activeList.map(s => <SessionCard key={s.id} s={s} active={active===s.id} onClick={()=>setActive(s.id)} onEdit={()=>{}} onRemove={()=>{}} />)}
            <SectionLabel style={{ margin:'14px 4px 8px' }}>Recent · {recentList.length}</SectionLabel>
            {recentList.map(s => <SessionCard key={s.id} s={s} active={active===s.id} onClick={()=>setActive(s.id)} onEdit={()=>{}} onRemove={()=>{}} />)}
          </>
        ) : (
          <div style={{ display:'grid', placeItems:'center', height:'100%', color:'#4a4458', fontFamily:"'JetBrains Mono',monospace", fontSize:11 }}>files pane…</div>
        )}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
