<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sidebar Chrome — migration reference</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">

<style>
  html,body{ margin:0; height:100%; }
  body{ background:#0d0d1c; font-family:'Inter',sans-serif; }
  #root{ position:fixed; inset:0; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

/* ── Icon (Material Symbols wrapper) ───────────────────────────────────── */
function Icon({ name, size = 18, fill = 0, style, ...rest }) {
  return <span {...rest} className="material-symbols-outlined" style={{
    fontSize:size, fontVariationSettings:`'FILL' ${fill}, 'wght' 400, 'GRAD' 0, 'opsz' ${size}`,
    lineHeight:1, userSelect:'none', ...style,
  }}>{name}</span>;
}

/* ══════════════════════════════════════════════════════════════════════ *
 *  SidebarToggle — ONE component, used in BOTH states so size/style match.
 *  Panel-left glyph; left rail is filled when the sidebar is open, hollow
 *  when collapsed. `inset` variant gives it a recessed well.
 * ══════════════════════════════════════════════════════════════════════ */
function SidebarToggle({ collapsed, onClick, size = 28, variant = 'ghost' }) {
  const [hover, setHover] = useState(false);
  const inset = variant === 'inset';
  const bg = inset ? (hover ? 'rgba(226,199,255,0.12)' : 'rgba(13,13,28,0.45)')
                   : (hover ? 'rgba(226,199,255,0.08)' : 'transparent');
  const border = inset ? (hover ? '1px solid rgba(203,166,247,0.4)' : '1px solid rgba(74,68,79,0.35)')
                       : '1px solid transparent';
  return (
    <button onClick={onClick}
      onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}
      title={collapsed ? 'Show sidebar  ⌘B' : 'Hide sidebar  ⌘B'}
      aria-label={collapsed ? 'Show sidebar' : 'Hide sidebar'} aria-pressed={collapsed}
      style={{
        width:size, height:size, flexShrink:0, borderRadius:7, border, background:bg,
        color: hover ? '#e2c7ff' : (inset ? '#9b93ab' : '#8a8299'), cursor:'pointer',
        display:'inline-flex', alignItems:'center', justifyContent:'center', transition:'all 140ms ease',
      }}>
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <rect x="1.6" y="2.6" width="12.8" height="10.8" rx="2.4" stroke="currentColor" strokeWidth="1.3"/>
        <path d="M5.9 2.9V13.1" stroke="currentColor" strokeWidth="1.3"/>
        {!collapsed && <rect x="2.2" y="3.2" width="3.1" height="9.6" rx="1.4" fill="currentColor" fillOpacity="0.28"/>}
      </svg>
    </button>
  );
}

/* ══════════════════════════════════════════════════════════════════════ *
 *  TopBarUtil — compact buttons that sit on the RIGHT of the sidebar top
 *  bar. Command Palette shows ⌘K inline; Settings is icon-only.
 * ══════════════════════════════════════════════════════════════════════ */
function TopBarUtil({ icon, label, kbd, onClick }) {
  const [hover, setHover] = useState(false);
  return (
    <button onClick={onClick}
      onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)} title={label}
      style={{
        height:28, flexShrink:0, display:'flex', alignItems:'center', gap:6,
        padding: kbd ? '0 8px 0 7px' : 0, width: kbd ? 'auto' : 28, justifyContent:'center',
        borderRadius:8, cursor:'pointer',
        background: hover ? 'rgba(226,199,255,0.08)' : 'rgba(26,26,42,0.6)',
        border: hover ? '1px solid rgba(203,166,247,0.4)' : '1px solid rgba(74,68,79,0.3)',
        color: hover ? '#e2c7ff' : '#9b93ab', transition:'all 140ms ease',
      }}>
      <Icon name={icon} size={15} style={{ flexShrink:0 }} />
      {kbd && <span style={{ fontFamily:"'JetBrains Mono', monospace", fontSize:9.5, fontWeight:600,
                             color: hover ? '#cba6f7' : '#6c7086', letterSpacing:'0.02em' }}>{kbd}</span>}
    </button>
  );
}

/* ══════════════════════════════════════════════════════════════════════ *
 *  SidebarTopBar — the new chrome row. 38px tall, dark fill matching the
 *  session-tab bar. Toggle pinned LEFT (left:12, vertically centred → the
 *  toggle's box is at viewport 12,5 size 28). Utilities pinned RIGHT.
 * ══════════════════════════════════════════════════════════════════════ */
function SidebarTopBar({ onToggleSidebar, onCommand, onSettings }) {
  return (
    <div style={{
      height:38, flexShrink:0, display:'flex', alignItems:'center', gap:6,
      paddingLeft:12, paddingRight:10,
      background:'#0d0d1c', borderBottom:'1px solid rgba(74,68,79,0.2)',
    }}>
      <SidebarToggle collapsed={false} onClick={onToggleSidebar} size={28} variant="inset" />
      <div style={{ flex:1 }} />
      <TopBarUtil icon="terminal" label="Command Palette" kbd="⌘K" onClick={onCommand} />
      <TopBarUtil icon="settings" label="Settings  ⌘," onClick={onSettings} />
    </div>
  );
}

/* ── Minimal sidebar body stub (NOT part of this migration — just context) ─ */
function SidebarBodyStub() {
  return (
    <div style={{ flex:1, minHeight:0, padding:'14px 12px', display:'flex', flexDirection:'column', gap:10 }}>
      <div style={{ height:180, borderRadius:13, background:'rgba(33,33,51,0.55)', boxShadow:'inset 0 1px 0 rgba(255,255,255,0.045)', display:'grid', placeItems:'center', color:'#4a4458', fontFamily:"'JetBrains Mono',monospace", fontSize:10 }}>agent status card</div>
      <div style={{ height:40, borderRadius:10, background:'rgba(13,13,28,0.6)', border:'1px solid rgba(74,68,79,0.3)' }}/>
      <div style={{ height:52, borderRadius:8, background:'rgba(255,255,255,0.02)', border:'1px solid rgba(74,68,79,0.18)' }}/>
      <div style={{ height:52, borderRadius:8, background:'rgba(255,255,255,0.02)', border:'1px solid rgba(74,68,79,0.18)' }}/>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════════ *
 *  DEMO SHELL — proves the toggle never moves. NOTE: there is NO icon rail.
 *  Layout is just [sidebar | main]. Collapsing unmounts the sidebar; main
 *  reclaims the full width; the toggle floats at the SAME viewport coords.
 * ══════════════════════════════════════════════════════════════════════ */
function Demo() {
  const [collapsed, setCollapsed] = useState(false);
  const toggle = () => setCollapsed(c => !c);
  return (
    <div style={{ position:'fixed', inset:0, display:'flex', background:'#0d0d1c', color:'#e3e0f7' }}>
      {/* SIDEBAR (unmounted when collapsed) */}
      {!collapsed && (
        <aside style={{ width:272, flexShrink:0, height:'100%', background:'#141424',
                        borderRight:'1px solid rgba(74,68,79,0.25)', display:'flex', flexDirection:'column' }}>
          <SidebarTopBar onToggleSidebar={toggle} onCommand={()=>alert('Command Palette')} onSettings={()=>alert('Settings')} />
          <SidebarBodyStub />
        </aside>
      )}

      {/* MAIN */}
      <main style={{ flex:1, minWidth:0, display:'flex', flexDirection:'column', position:'relative' }}>
        {/* Collapsed: the SAME toggle floats over the tab bar at the SAME 12,5 / 28px box */}
        {collapsed && (
          <div style={{ position:'absolute', top:5, left:12, zIndex:30 }}>
            <SidebarToggle collapsed={true} onClick={toggle} size={28} variant="inset" />
          </div>
        )}
        {/* session-tab bar — paddingLeft clears the floating toggle when collapsed */}
        <div style={{ height:38, flexShrink:0, display:'flex', alignItems:'center',
                      paddingLeft: collapsed ? 48 : 12, paddingRight:8,
                      background:'#0d0d1c', borderBottom:'1px solid rgba(74,68,79,0.25)',
                      fontFamily:"'JetBrains Mono',monospace", fontSize:11, color:'#8a8299' }}>
          session tabs…
        </div>
        <div style={{ flex:1, display:'grid', placeItems:'center', color:'#4a4458',
                      fontFamily:"'JetBrains Mono',monospace", fontSize:12 }}>
          main region — no icon rail · press the toggle (top-left) to collapse / expand
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
