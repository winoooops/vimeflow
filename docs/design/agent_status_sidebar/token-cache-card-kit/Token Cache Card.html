<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Token Cache Card — migration reference</title>

<!-- DEP: fonts. JetBrains Mono = labels/values · Instrument Sans = the big % number · Inter = the small hint text -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Instrument+Sans:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>
  html,body{ margin:0; height:100%; }
  body{
    background:#0d0d18;
    display:grid; place-items:center;
    font-family:'JetBrains Mono',monospace;
  }
  /* the card sits in a 280px column to mirror the activity panel width */
  .panel{ width:280px; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root" class="panel"></div>

<script type="text/babel">
const { useState } = React;

/* ============================================================ *
 *  DEPENDENCY 1 — SectionLabel  (the "TOKEN CACHE" header)
 *  from src/primitives.jsx
 * ============================================================ */
function SectionLabel({ children, right, style }) {
  return (
    <div style={{
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      padding: '0 2px',
      fontFamily: "'JetBrains Mono', monospace",
      fontSize: 10, fontWeight: 700, color: '#8a8299',
      letterSpacing: '0.18em', textTransform: 'uppercase',
      ...style,
    }}>
      <span>{children}</span>
      {right}
    </div>
  );
}

/* ============================================================ *
 *  DEPENDENCY 2 — Sparkline  (inline SVG line + filled area: the
 *  current-session hit-rate trend next to the big number)
 *  from src/activity.jsx
 * ============================================================ */
function Sparkline({ data, color, dim }) {
  if (!data || data.length === 0) {
    return <div style={{
      width: '100%', height: '100%', display: 'grid', placeItems: 'center',
      fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: '#4a444f',
    }}>no data yet</div>;
  }
  const w = 100, h = 36;
  const max = Math.max(100, ...data);
  const min = Math.max(0, Math.min(...data) - 10);
  const span = Math.max(1, max - min);
  const step = data.length > 1 ? w / (data.length - 1) : w;
  const pts = data.map((v, i) => {
    const x = i * step;
    const y = h - ((v - min) / span) * (h - 6) - 3;
    return [x, y];
  });
  const linePath = pts.map(([x,y],i) => `${i===0?'M':'L'}${x.toFixed(1)},${y.toFixed(1)}`).join(' ');
  const fillPath = `${linePath} L${w},${h} L0,${h} Z`;
  const last = pts[pts.length - 1];
  return (
    <svg viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" style={{ width: '100%', height: '100%', display: 'block' }}>
      <defs>
        <linearGradient id="vf-spark-fill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stopColor={color} stopOpacity="0.32"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={fillPath} fill="url(#vf-spark-fill)"/>
      <path d={linePath} fill="none" stroke={color} strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round" vectorEffect="non-scaling-stroke"/>
      <circle cx={last[0]} cy={last[1]} r="1.8" fill={color}/>
      <circle cx={last[0]} cy={last[1]} r="3.5" fill={color} fillOpacity="0.25"/>
    </svg>
  );
}

/* ============================================================ *
 *  DEPENDENCY 3 — CacheStackBar  (the cached/wrote/fresh ratio bar)
 *  from src/activity.jsx
 * ============================================================ */
function CacheStackBar({ cached, wrote, fresh }) {
  const total = cached + wrote + fresh;
  if (total === 0) {
    return <div style={{ height: 8, borderRadius: 999, background: 'rgba(74,68,79,0.25)' }}/>;
  }
  const cPct = (cached / total) * 100;
  const wPct = (wrote  / total) * 100;
  const fPct = (fresh  / total) * 100;
  const cTone = cPct >= 70 ? '#7defa1' : cPct >= 40 ? '#cba6f7' : '#ff94a5';
  return (
    <div style={{
      height: 8, borderRadius: 999, overflow: 'hidden',
      background: 'rgba(13,13,28,0.6)',
      border: '1px solid rgba(74,68,79,0.25)',
      display: 'flex',
    }}>
      <div title={`cached ${Math.round(cPct)}%`} style={{
        width: `${cPct}%`,
        background: `linear-gradient(90deg, ${cTone}, ${cTone}cc)`,
        boxShadow: `inset 0 0 6px ${cTone}55`,
      }}/>
      <div title={`wrote ${Math.round(wPct)}%`} style={{
        width: `${wPct}%`,
        background: 'linear-gradient(90deg, #a8c8ff, #8aa9d8)',
      }}/>
      <div title={`fresh ${Math.round(fPct)}%`} style={{
        width: `${fPct}%`,
        background: 'rgba(205,195,209,0.4)',
      }}/>
    </div>
  );
}

/* ============================================================ *
 *  THE CARD — Token Cache block
 *  Scoped to the CURRENT session only (no cross-session history).
 *  Props:
 *    cache = { cached, wrote, fresh, history: number[] }
 *           history = past hit-rate % readings THIS session (sparkline)
 *    rate  = cached-this-turn %  (caller computes: cached/(cached+wrote+fresh))
 * ============================================================ */
function CacheBlock({ cache, rate }) {
  // Tone: green if >=70, lavender if 40-69, pink if <40
  const tone = rate >= 70 ? 'success' : rate >= 40 ? 'primary' : 'warn';
  const toneColor = tone === 'success' ? '#7defa1' : tone === 'warn' ? '#ff94a5' : '#e2c7ff';
  const toneDim   = tone === 'success' ? 'rgba(125,239,161,0.55)' : tone === 'warn' ? 'rgba(255,148,165,0.55)' : 'rgba(226,199,255,0.55)';
  const fmt = (n) => n >= 1000 ? `${(n/1000).toFixed(1)}k` : `${n}`;

  return (
    <div style={{ padding: '14px 16px 14px', borderBottom: '1px solid rgba(74,68,79,0.18)' }}>
      <div style={{ display: 'flex', alignItems: 'center', marginBottom: 10 }}>
        <SectionLabel>Token cache</SectionLabel>
      </div>

      {/* Unified card: hit rate + sparkline, then token breakdown */}
      <div style={{
        borderRadius: 10,
        background: `linear-gradient(135deg, ${tone === 'success' ? 'rgba(125,239,161,0.06)' : tone === 'warn' ? 'rgba(255,148,165,0.06)' : 'rgba(203,166,247,0.06)'}, rgba(13,13,28,0.5))`,
        border: `1px solid ${toneColor}26`,
        overflow: 'hidden',
      }}>
        {/* Big number + sparkline (current session) */}
        <div style={{ display: 'flex', alignItems: 'flex-end', gap: 12, padding: '12px 14px' }}>
          <div>
            <div style={{ display: 'flex', alignItems: 'baseline', gap: 4 }}>
              <span style={{
                fontFamily: "'Instrument Sans', system-ui",
                fontSize: 28, fontWeight: 600, color: '#e3e0f7',
                fontVariantNumeric: 'tabular-nums', letterSpacing: '-0.02em',
              }}>{rate}</span>
              <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 13, color: toneColor, fontWeight: 600 }}>%</span>
            </div>
            <div style={{
              fontFamily: "'JetBrains Mono', monospace",
              fontSize: 9.5, color: '#8a8299', letterSpacing: '0.06em',
              textTransform: 'uppercase', marginTop: 2,
            }}>cached this turn</div>
          </div>
          <div style={{ flex: 1, minWidth: 0, height: 36 }}>
            <Sparkline data={cache.history || []} color={toneColor} dim={toneDim} />
          </div>
        </div>

        {/* Token breakdown — cached / wrote / fresh */}
        <div style={{
          padding: '11px 14px 13px',
          borderTop: '1px solid rgba(74,68,79,0.2)',
          background: 'rgba(13,13,28,0.25)',
        }}>
          <CacheStackBar cached={cache.cached} wrote={cache.wrote} fresh={cache.fresh}/>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8, marginTop: 10 }}>
            {[
              { label: 'cached', hint: 'free reuse', value: fmt(cache.cached) },
              { label: 'wrote',  hint: 'uploaded',    value: fmt(cache.wrote) },
              { label: 'fresh',  hint: 'new tokens',  value: fmt(cache.fresh) },
            ].map(s => (
              <div key={s.label} style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
                <span style={{
                  fontFamily: "'JetBrains Mono', monospace", fontSize: 11.5,
                  color: '#e3e0f7', fontWeight: 600, fontVariantNumeric: 'tabular-nums',
                }}>{s.value}</span>
                <div style={{
                  fontFamily: "'JetBrains Mono', monospace", fontSize: 9,
                  color: '#8a8299', letterSpacing: '0.06em', textTransform: 'uppercase',
                }}>{s.label}</div>
                <div style={{ fontFamily: "'Inter', sans-serif", fontSize: 10, color: '#6c7086' }}>{s.hint}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---- demo mount: the auth-session numbers from the screenshot ---- */
const demoCache = {
  cached: 8400, wrote: 2100, fresh: 740,
  history: [42, 51, 49, 58, 63, 61, 69, 72, 70, 75],
};
const demoRate = Math.round((demoCache.cached / (demoCache.cached + demoCache.wrote + demoCache.fresh)) * 100);

ReactDOM.createRoot(document.getElementById('root')).render(<CacheBlock cache={demoCache} rate={demoRate} />);
</script>
</body>
</html>
